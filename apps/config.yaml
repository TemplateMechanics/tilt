# Service Deployment Patterns
#
# This workspace demonstrates three deployment patterns:
#
# 1. CROSSPLANE (DevApplication XRD)
#    - Best for: Services needing advanced lifecycle management, dependencies, or sub-resources
#    - Location: apps/*.yaml
#    - Examples: harbor (with projects), jenkins (with jobs), langfuse, qdrant, localstack
#    - Features: Composable, can create sub-resources (repos, users, etc.)
#
# 2. TILT + FLUX (HelmRelease via k8s_kustomize)
#    - Best for: External Helm charts with GitOps reconciliation
#    - Location: helm/<service>/kustomization.yaml (with helm-release.yaml)
#    - Examples: ollama, kyverno, falco, keda, velero, cert-manager
#    - Features: Flux manages Helm lifecycle, Tilt shows status
#
# 3. TILT + RAW MANIFESTS
#    - Best for: Simple services, official images, avoiding Helm complexity
#    - Location: helm/<service>/*.yaml (no HelmRelease, direct k8s manifests)
#    - Examples: mongodb, postgresql, redis, rabbitmq, keycloak, airflow, wordpress
#    - Features: Direct control, easy customization, official images

