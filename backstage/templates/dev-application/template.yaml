apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dev-application
  title: New Development Application
  description: Scaffold a new application for local development with Crossplane and Tilt
  tags:
    - crossplane
    - tilt
    - kubernetes
    - helm
spec:
  owner: platform-team
  type: service
  
  parameters:
    - title: Application Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for the application (lowercase, no spaces)
          pattern: '^[a-z][a-z0-9-]*$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of the application
        owner:
          title: Owner
          type: string
          description: Team that owns this application
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
              
    - title: Deployment Configuration
      required:
        - deploymentType
      properties:
        deploymentType:
          title: Deployment Type
          type: string
          description: How should this application be deployed?
          enum:
            - crossplane-app
            - flux-helm
            - raw-manifest
          enumNames:
            - Crossplane DevApplication (with sub-resources)
            - Flux HelmRelease (GitOps Helm)
            - Raw Kubernetes Manifests
          default: crossplane-app
        helmChart:
          title: Helm Chart (optional)
          type: string
          description: Name of the Helm chart to use (e.g., bitnami/postgresql)
        helmVersion:
          title: Helm Chart Version
          type: string
          description: Version of the Helm chart
        helmRepo:
          title: Helm Repository Name
          type: string
          description: Name for the HelmRepository resource (defaults to app name)
        helmRepoUrl:
          title: Helm Repository URL
          type: string
          description: URL of the Helm repository (e.g., https://charts.bitnami.com/bitnami)
        image:
          title: Container Image
          type: string
          description: Container image for raw-manifest deployments (e.g., nginx:latest)
        imageTag:
          title: Image Tag
          type: string
          description: Tag for the container image
        namespace:
          title: Namespace
          type: string
          description: Kubernetes namespace (defaults to app name)
          
    - title: Ingress Configuration
      properties:
        createIngress:
          title: Create Ingress
          type: boolean
          description: Create a Traefik IngressRoute for this application
          default: true
        ingressPort:
          title: Service Port
          type: integer
          description: Port to expose via ingress
          default: 80
          
    - title: Catalog Integration
      properties:
        addToCatalog:
          title: Add to Backstage Catalog
          type: boolean
          description: Create a catalog-info.yaml for this application
          default: true
        providesApi:
          title: Provides API
          type: boolean
          description: Does this application provide an API?
          default: false
        apiType:
          title: API Type
          type: string
          enum:
            - openapi
            - grpc
            - graphql
          default: openapi
          
  steps:
    - id: fetch
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          deploymentType: ${{ parameters.deploymentType }}
          helmChart: ${{ parameters.helmChart }}
          helmVersion: ${{ parameters.helmVersion }}
          helmRepo: ${{ parameters.helmRepo }}
          helmRepoUrl: ${{ parameters.helmRepoUrl }}
          image: ${{ parameters.image }}
          imageTag: ${{ parameters.imageTag }}
          namespace: ${{ parameters.namespace | default(parameters.name) }}
          createIngress: ${{ parameters.createIngress }}
          port: ${{ parameters.ingressPort }}
          ingress: ${{ parameters.createIngress }}
          healthCheck: true
          addToCatalog: ${{ parameters.addToCatalog }}
          providesApi: ${{ parameters.providesApi }}
          apiType: ${{ parameters.apiType }}
          
    - id: publish
      name: Publish to GitHub
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=tilt&owner=TemplateMechanics
        branchName: add-${{ parameters.name }}
        title: 'feat: Add ${{ parameters.name }} to dev environment'
        description: |
          This PR adds **${{ parameters.name }}** to the local development environment.
          
          - Deployment Type: ${{ parameters.deploymentType }}
          - Namespace: ${{ parameters.namespace | default(parameters.name) }}
          - Owner: ${{ parameters.owner }}
          
          ## Changes
          - Added Kubernetes manifests in `helm/${{ parameters.name }}/`
          - Updated Tiltfile CONFIG
          - Created catalog entry
          
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: ${{ steps.publish.output.remoteUrl | replace('.git', '') }}/blob/${{ steps.publish.output.branchName }}/helm/${{ parameters.name }}/catalog-info.yaml
        optional: true
        
  output:
    links:
      - title: Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Tilt
        url: http://localhost:10350
