{%- if values.deploymentType == 'raw-manifests' %}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
        app.kubernetes.io/name: ${{ values.name }}
    spec:
      containers:
        - name: ${{ values.name }}
          image: ${{ values.image }}
          {%- if values.port %}
          ports:
            - containerPort: ${{ values.port }}
              name: http
          {%- endif %}
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          {%- if values.healthCheck %}
          readinessProbe:
            httpGet:
              path: /
              port: ${{ values.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: ${{ values.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          {%- endif %}
{%- endif %}
