{%- if values.deploymentType == 'helm-release' %}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
spec:
  interval: 30m
  chart:
    spec:
      chart: ${{ values.helmChart | default(values.name) }}
      version: "${{ values.helmVersion | default('*') }}"
      sourceRef:
        kind: HelmRepository
        name: ${{ values.helmRepo | default(values.name) }}
        namespace: flux-system
      interval: 12h
  values:
    # Add your Helm values here
    {%- if values.image %}
    image:
      repository: ${{ values.image }}
      {%- if values.imageTag %}
      tag: "${{ values.imageTag }}"
      {%- endif %}
    {%- endif %}
    {%- if values.port %}
    service:
      port: ${{ values.port }}
    {%- endif %}
{%- endif %}
