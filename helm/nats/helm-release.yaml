apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats
  namespace: nats
spec:
  interval: 5m
  chart:
    spec:
      chart: nats
      version: "1.2.6"
      sourceRef:
        kind: HelmRepository
        name: nats
        namespace: flux-system
  values:
    config:
      cluster:
        enabled: false
      jetstream:
        enabled: true
        memoryStore:
          maxSize: 256Mi
        fileStore:
          maxSize: 1Gi
          pvc:
            enabled: true
            size: 2Gi
      monitor:
        enabled: true
        port: 8222
    service:
      ports:
        nats:
          enabled: true
        monitor:
          enabled: true
    podTemplate:
      topologySpreadConstraints: {}
    container:
      merge:
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 64Mi
    promExporter:
      enabled: true
      port: 7777
