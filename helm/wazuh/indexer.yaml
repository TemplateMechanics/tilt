---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
spec:
  serviceName: wazuh-indexer
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-indexer
  template:
    metadata:
      labels:
        app: wazuh-indexer
    spec:
      # OpenSearch requires vm.max_map_count >= 262144
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
          securityContext:
            privileged: true
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/wazuh-indexer"]
          volumeMounts:
            - name: indexer-data
              mountPath: /var/lib/wazuh-indexer
      containers:
        - name: wazuh-indexer
          image: wazuh/wazuh-indexer:4.9.0
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: bootstrap.memory_lock
              value: "true"
          ports:
            - containerPort: 9200
              name: http
              protocol: TCP
          volumeMounts:
            - name: indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: indexer-config
              mountPath: /usr/share/wazuh-indexer/opensearch.yml
              subPath: opensearch.yml
          resources:
            limits:
              cpu: "1"
              memory: 1536Mi
            requests:
              cpu: 250m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: indexer-data
          persistentVolumeClaim:
            claimName: wazuh-indexer-data
        - name: indexer-config
          configMap:
            name: wazuh-indexer-config
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
      name: http
      protocol: TCP
  selector:
    app: wazuh-indexer
