apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: connect
  namespace: 1password
spec:
  interval: 5m
  chart:
    spec:
      chart: connect
      version: "2.0.5"
      sourceRef:
        kind: HelmRepository
        name: 1password
        namespace: flux-system
  values:
    operator:
      create: true
      token:
        name: 1password-access-token
        key: token
    connect:
      credentialsName: 1password-credentials-json
      credentialsKey: connect
      serviceType: NodePort
      


