apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Choose your approach:
# Option 1: KubeVirt VM (recommended - requires kubevirt installed)
# Option 2: Docker-eyeOS container (legacy - requires privileged containers)

resources:
  - namespace.yaml
  
  # === Option 1: KubeVirt VM (recommended) ===
  - pvc-kubevirt.yaml
  - virtualmachine.yaml
  
  # === Option 2: Docker-eyeOS Container (legacy) ===
  # Uncomment these and comment out the KubeVirt resources above
  # - pvc.yaml
  # - statefulset.yaml
  # - service.yaml
  
  # Ingress & Service (works with both approaches — KubeVirt service is in virtualmachine.yaml)
  - ingress.yaml
