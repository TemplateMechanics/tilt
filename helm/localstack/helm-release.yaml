apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: localstack
  namespace: localstack
spec:
  interval: 5m
  chart:
    spec:
      chart: localstack
      version: ">=0.6.0"
      sourceRef:
        kind: HelmRepository
        name: localstack
        namespace: flux-system
  values:
    service:
      type: ClusterIP
    persistence:
      enabled: true
      size: 10Gi
