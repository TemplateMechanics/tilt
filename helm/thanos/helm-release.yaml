apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: thanos
  namespace: thanos
spec:
  interval: 5m
  chart:
    spec:
      chart: thanos
      version: "15.7.19"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    query:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      stores:
        - dnssrv+_grpc._tcp.thanos-storegateway.thanos.svc.cluster.local
      dnsDiscovery:
        sidecarsService: prometheus-server
        sidecarsNamespace: monitoring
    queryFrontend:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
    compactor:
      enabled: true
      resources:
        limits:
          cpu: 200m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
      persistence:
        enabled: true
        size: 5Gi
    storegateway:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 200m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
      persistence:
        enabled: true
        size: 5Gi
    ruler:
      enabled: false
    receive:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
