---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 5m
  chart:
    spec:
      chart: harbor
      version: ">=1.15.0"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
  values:
    expose:
      type: ingress
      tls:
        enabled: false
      ingress:
        hosts:
          core: harbor.localhost
        className: traefik
    externalURL: http://harbor.localhost
    harborAdminPassword: "P@ssw0rd"
    trivy:
      enabled: false
    database:
      type: internal
    redis:
      type: internal
    persistence:
      persistentVolumeClaim:
        registry:
          size: 5Gi
        database:
          size: 1Gi
        redis:
          size: 1Gi