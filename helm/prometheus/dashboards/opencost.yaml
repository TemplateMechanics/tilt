apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-opencost
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Observability"
data:
  opencost.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Cluster Cost Overview",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "Total Cluster Cost",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum(opencost_cluster_total_cost) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 500 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Total CPU Cost",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "targets": [
            {
              "expr": "sum(opencost_node_cpu_cost) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Total Memory Cost",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "targets": [
            {
              "expr": "sum(opencost_node_ram_cost) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "orange", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Total Storage Cost",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "targets": [
            {
              "expr": "sum(opencost_node_storage_cost) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "purple", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Cost by Namespace",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "title": "CPU Cost by Namespace",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "topk(10, sum by (namespace) (opencost_namespace_cpu_cost))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "orange", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        },
        {
          "title": "Memory Cost by Namespace",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            {
              "expr": "topk(10, sum by (namespace) (opencost_namespace_ram_cost))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "orange", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        },
        {
          "title": "Node Cost Breakdown",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "collapsed": false
        },
        {
          "title": "Cost per Node Over Time",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "targets": [
            {
              "expr": "sum by (node) (opencost_node_cpu_cost + opencost_node_ram_cost + opencost_node_storage_cost)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "currencyUSD",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "title": "Allocation Efficiency (CPU)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "targets": [
            {
              "expr": "sum(opencost_namespace_cpu_cost) / sum(opencost_node_cpu_cost) * 100",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "CPU Efficiency"
            },
            {
              "expr": "sum(opencost_namespace_ram_cost) / sum(opencost_node_ram_cost) * 100",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "Memory Efficiency"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "opencost",
        "cost",
        "finops",
        "observability"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "OpenCost",
      "uid": "opencost-dashboard",
      "version": 1
    }
