apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-thanos
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Observability"
data:
  thanos.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Query Overview",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "Query Gate In-Flight",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum(thanos_query_gate_queries_in_flight) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Store Blocks Loaded",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "targets": [
            {
              "expr": "sum(thanos_store_blocks_loaded) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Compactor Runs Total",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "targets": [
            {
              "expr": "sum(thanos_compactor_group_compactions_total) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Compactor Halted",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "targets": [
            {
              "expr": "sum(thanos_compactor_halted) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Query Performance",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "title": "Query Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(thanos_query_duration_seconds_bucket[5m])))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(thanos_query_duration_seconds_bucket[5m])))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(thanos_query_duration_seconds_bucket[5m])))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "title": "Query Gate In-Flight Over Time",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            {
              "expr": "sum(thanos_query_gate_queries_in_flight)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "In-Flight Queries"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "orange" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "title": "Store & Compactor",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "collapsed": false
        },
        {
          "title": "Object Store Operations Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "targets": [
            {
              "expr": "sum by (operation) (rate(thanos_objstore_bucket_operations_total[5m]))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{operation}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "ops",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "title": "Store Blocks Loaded Over Time",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "targets": [
            {
              "expr": "sum(thanos_store_blocks_loaded)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "Loaded Blocks"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "thanos",
        "prometheus",
        "long-term-storage",
        "observability"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Thanos",
      "uid": "thanos-dashboard",
      "version": 1
    }
