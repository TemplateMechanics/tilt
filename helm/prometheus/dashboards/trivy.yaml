apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-trivy
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Security"
data:
  trivy.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Vulnerability Overview",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "Critical Vulnerabilities",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"}) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true, "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "High Vulnerabilities",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"High\"}) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true, "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Medium Vulnerabilities",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Medium\"}) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true, "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Low Vulnerabilities",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Low\"}) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true, "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Config Audit Passes",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "targets": [
            {
              "expr": "sum(trivy_resource_configaudits{severity=\"Critical\"}) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true, "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Exposed Secrets",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "targets": [
            {
              "expr": "sum(trivy_image_exposedsecrets{severity=\"Critical\"}) or vector(0)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "instant": true, "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "title": "Vulnerabilities by Namespace",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "title": "Critical + High Vulns by Namespace",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "sum by (namespace) (trivy_image_vulnerabilities{severity=~\"Critical|High\"})",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "orange", "value": 20 },
                  { "color": "red", "value": 50 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        },
        {
          "title": "Vulnerability Severity Distribution",
          "type": "piechart",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_image_vulnerabilities)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{severity}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Critical" },
                "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "High" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Medium" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Low" },
                "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Unknown" },
                "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }]
              }
            ]
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "pieType": "donut",
            "tooltip": { "mode": "multi" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": ["value", "percent"]
            }
          }
        },
        {
          "title": "Workload Details",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "collapsed": false
        },
        {
          "title": "Top Vulnerable Images (Critical + High)",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 15 },
          "targets": [
            {
              "expr": "topk(20, sum by (image_repository, image_tag, namespace, resource_name) (trivy_image_vulnerabilities{severity=~\"Critical|High\"}))",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "severity": true
                },
                "renameByName": {
                  "Value": "Vuln Count",
                  "image_repository": "Image",
                  "image_tag": "Tag",
                  "namespace": "Namespace",
                  "resource_name": "Resource"
                },
                "indexByName": {
                  "namespace": 0,
                  "resource_name": 1,
                  "image_repository": 2,
                  "image_tag": 3,
                  "Value": 4
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [
                  { "field": "Vuln Count", "desc": true }
                ]
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Vuln Count" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          }
        },
        {
          "title": "Configuration Audits",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "collapsed": false
        },
        {
          "title": "Config Audit Findings by Severity",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 26 },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_resource_configaudits)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{severity}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        },
        {
          "title": "RBAC Assessment Findings",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 26 },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_role_rbacassessments) > 0",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{severity}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "trivy",
        "security",
        "vulnerabilities"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Trivy Vulnerability Scanner",
      "uid": "trivy-dashboard",
      "version": 1
    }
