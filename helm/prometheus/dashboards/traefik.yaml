apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traefik
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Services"
data:
  traefik.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Traefik Overview",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "title": "Total Requests/s",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_entrypoint_requests_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "4xx Errors/s",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_entrypoint_requests_total{code=~\"4..\"}[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "5xx Errors/s",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_entrypoint_requests_total{code=~\"5..\"}[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Open Connections",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(traefik_entrypoint_open_connections)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Requests by Service",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(traefik_service_requests_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{service}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "Response Time by Service (p95)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (service, le) (rate(traefik_service_request_duration_seconds_bucket[5m])))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{service}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "title": "Requests by Entrypoint",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "targets": [
            {
              "expr": "sum by (entrypoint) (rate(traefik_entrypoint_requests_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{entrypoint}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "Status Code Distribution",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "targets": [
            {
              "expr": "sum by (code) (rate(traefik_entrypoint_requests_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{code}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "Requests by Router",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 21
          },
          "targets": [
            {
              "expr": "sum by (router) (rate(traefik_router_requests_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{router}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "traefik",
        "ingress"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_LOKI",
            "query": "loki",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Traefik",
      "uid": "traefik-dashboard",
      "version": 1
    }
