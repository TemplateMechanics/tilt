apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-qdrant
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Services"
data:
  qdrant.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Qdrant Vector Database",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "title": "Collections",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "qdrant_app_info_collections_total or collections_total or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "gRPC Responses/s",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(qdrant_grpc_responses_total[5m])) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "REST Responses/s",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(qdrant_rest_responses_total[5m])) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Memory Usage",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=~\".*qdrant.*\"}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "gRPC Response Duration (p95)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, endpoint) (rate(qdrant_grpc_responses_duration_seconds_bucket[5m])))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{endpoint}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "title": "REST Response Duration (p95)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, endpoint) (rate(qdrant_rest_responses_duration_seconds_bucket[5m])))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{endpoint}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "qdrant",
        "vector-db"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_LOKI",
            "query": "loki",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Qdrant",
      "uid": "qdrant-dashboard",
      "version": 1
    }
