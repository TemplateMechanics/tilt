apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cert-manager
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure"
data:
  cert-manager.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "cert-manager",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "title": "Certificates Ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "count(certmanager_certificate_ready_status{condition=\"True\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Certificates Not Ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 8,
            "y": 1
          },
          "targets": [
            {
              "expr": "count(certmanager_certificate_ready_status{condition=\"False\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Nearest Expiry",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 16,
            "y": 1
          },
          "targets": [
            {
              "expr": "min(certmanager_certificate_expiration_timestamp_seconds) - time()",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 604800
                  },
                  {
                    "color": "green",
                    "value": 2592000
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Certificate Expiry Times",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{name}} ({{namespace}})",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "d"
            },
            "overrides": []
          }
        },
        {
          "title": "ACME Client Requests",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "targets": [
            {
              "expr": "sum by (status) (rate(certmanager_http_acme_client_request_count[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{status}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "Controller Reconcile Rate",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "targets": [
            {
              "expr": "sum by (controller) (rate(certmanager_controller_sync_call_count[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{controller}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "ops"
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "cert-manager",
        "certificates"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_LOKI",
            "query": "loki",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "cert-manager",
      "uid": "certmanager-dashboard",
      "version": 1
    }
