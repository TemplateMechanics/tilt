      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Cluster Health",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "title": "Running Pods",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Failed Pods",
