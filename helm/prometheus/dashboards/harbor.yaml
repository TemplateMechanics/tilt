apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-harbor
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Services"
data:
  harbor.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Harbor Registry",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "title": "Total Projects",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "harbor_project_total or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Total Repositories",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "targets": [
            {
              "expr": "harbor_project_repo_total or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "Total Artifacts",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(harbor_artifact_pulled) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "System Health",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "targets": [
            {
              "expr": "harbor_health or vector(1)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": true,
              "range": false
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "title": "HTTP Requests",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "expr": "sum by (operation) (rate(harbor_core_http_request_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{operation}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "Request Duration (p95)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (operation, le) (rate(harbor_core_http_request_duration_seconds_bucket[5m])))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{operation}}",
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "harbor",
        "registry"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0,
            "includeAll": false,
            "name": "DS_LOKI",
            "query": "loki",
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Harbor",
      "uid": "harbor-dashboard",
      "version": 1
    }
