apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nats
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - nats
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  endpoints:
    - port: prom-metrics
      interval: 30s
