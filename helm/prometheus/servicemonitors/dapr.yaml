apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dapr
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - dapr-system
  selector:
    matchLabels:
      app: dapr-operator
  endpoints:
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dapr-sidecar-injector
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - dapr-system
  selector:
    matchLabels:
      app: dapr-sidecar-injector
  endpoints:
    - port: metrics
      interval: 30s
