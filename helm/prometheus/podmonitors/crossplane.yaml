apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: crossplane
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: crossplane
spec:
  selector:
    matchLabels:
      app: crossplane
  namespaceSelector:
    matchNames:
      - crossplane-system
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
