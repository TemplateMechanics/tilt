apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: qdrant
spec:
  interval: 5m
  chart:
    spec:
      chart: qdrant
      version: '>=0.8.0'
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: qdrant
      interval: 1m
  values:
    # Replica count
    replicaCount: 1
    
    # Persistent storage for vectors
    persistence:
      enabled: true
      size: 20Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
    
    # Service configuration
    service:
      type: ClusterIP
      port: 6333
      grpcPort: 6334
    
    # Ingress configuration
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: qdrant.localhost
          paths:
            - path: /
              pathType: Prefix
    
    # API key configuration (optional)
    apiKey: ""
    
    # Resources
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    
    # Config
    config:
      cluster:
        enabled: false
