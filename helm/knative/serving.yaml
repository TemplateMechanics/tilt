---
# KnativeServing CR — instructs the operator to install Knative Serving
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: knative-serving
  namespace: knative-serving
spec:
  version: "1.16.0"
  config:
    network:
      ingress-class: traefik.ingress.networking.knative.dev
    domain:
      knative.localhost: ""
    defaults:
      container-concurrency: "0"
      revision-timeout-seconds: "300"
  high-availability:
    replicas: 1
---
# KnativeEventing CR — instructs the operator to install Knative Eventing
apiVersion: operator.knative.dev/v1beta1
kind: KnativeEventing
metadata:
  name: knative-eventing
  namespace: knative-eventing
spec:
  version: "1.16.0"
  high-availability:
    replicas: 1
---
apiVersion: v1
kind: Namespace
metadata:
  name: knative-eventing
