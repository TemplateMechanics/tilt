apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-catalog
  namespace: backstage
data:
  all.yaml: |
    # =============================================================================
    # ORGANIZATIONAL ENTITIES
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: infrastructure
      description: Infrastructure and platform services
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: developer-tools
      description: Developer productivity and testing tools
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: ai-ml
      description: AI/ML services and infrastructure
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: data-platform
      description: Data processing and workflow orchestration
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Group
    metadata:
      name: platform-team
      description: Platform engineering team
    spec:
      type: team
      children: []
    
    # =============================================================================
    # SYSTEMS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: observability-stack
      description: Monitoring, logging, and tracing infrastructure
    spec:
      owner: platform-team
      domain: infrastructure
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: airflow-system
      description: Apache Airflow workflow orchestration platform
      annotations:
        dev.tilt/config-key: raw_apps.airflow
    spec:
      owner: platform-team
      domain: data-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: harbor-system
      description: Harbor container registry with scanning and replication
      annotations:
        dev.tilt/config-key: crossplane_apps.harbor
    spec:
      owner: platform-team
      domain: infrastructure
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: keycloak-system
      description: Keycloak identity and access management
      annotations:
        dev.tilt/config-key: raw_apps.keycloak
    spec:
      owner: platform-team
      domain: infrastructure
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: wazuh-system
      description: Wazuh SIEM platform for threat detection and log analysis
      annotations:
        dev.tilt/config-key: raw_apps.wazuh
    spec:
      owner: platform-team
      domain: infrastructure
    
    # =============================================================================
    # APIS - Service interfaces
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: traefik-api
      description: Traefik ingress routing and dashboard API
      tags:
        - rest
        - ingress
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Traefik API
          version: "2.0"
        paths:
          /api/overview:
            get:
              summary: Get Traefik overview
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: prometheus-api
      description: Prometheus metrics query API
      tags:
        - rest
        - metrics
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: observability-stack
      definition: |
        openapi: "3.0.0"
        info:
          title: Prometheus API
          version: "2.0"
        paths:
          /api/v1/query:
            get:
              summary: Query metrics
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: harbor-api
      description: Harbor container registry API
      tags:
        - rest
        - registry
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: harbor-system
      definition: |
        openapi: "3.0.0"
        info:
          title: Harbor API
          version: "2.0"
        paths:
          /api/v2.0/projects:
            get:
              summary: List projects
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: keycloak-api
      description: Keycloak admin and OIDC API
      tags:
        - rest
        - oidc
        - authentication
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: keycloak-system
      definition: |
        openapi: "3.0.0"
        info:
          title: Keycloak Admin API
          version: "20.0"
        paths:
          /admin/realms:
            get:
              summary: List realms
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: airflow-api
      description: Apache Airflow REST API
      tags:
        - rest
        - workflow
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: airflow-system
      definition: |
        openapi: "3.0.0"
        info:
          title: Airflow API
          version: "2.0"
        paths:
          /api/v1/dags:
            get:
              summary: List DAGs
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: langfuse-api
      description: Langfuse LLM observability API
      tags:
        - rest
        - llm
        - tracing
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Langfuse API
          version: "1.0"
        paths:
          /api/public/traces:
            get:
              summary: List traces
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: qdrant-api
      description: Qdrant vector database API
      tags:
        - rest
        - vector-db
        - grpc
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Qdrant API
          version: "1.0"
        paths:
          /collections:
            get:
              summary: List collections
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: ollama-api
      description: Ollama LLM inference API
      tags:
        - rest
        - llm
        - inference
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Ollama API
          version: "1.0"
        paths:
          /api/generate:
            post:
              summary: Generate completion
    
    # =============================================================================
    # RESOURCES - Databases, Caches, Storage
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: airflow-postgresql
      description: PostgreSQL database for Airflow metadata
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: airflow-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: airflow-redis
      description: Redis for Airflow Celery broker
      tags:
        - cache
        - redis
        - celery
    spec:
      type: database
      owner: platform-team
      system: airflow-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: backstage-postgresql
      description: PostgreSQL database for Backstage catalog
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: harbor-redis
      description: Redis cache for Harbor
      tags:
        - cache
        - redis
    spec:
      type: database
      owner: platform-team
      system: harbor-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: harbor-postgresql
      description: PostgreSQL database for Harbor
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: harbor-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: keycloak-postgresql
      description: PostgreSQL database for Keycloak
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: keycloak-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: langfuse-postgresql
      description: PostgreSQL database for Langfuse
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: jenkins-storage
      description: Persistent storage for Jenkins home
      tags:
        - storage
        - pvc
    spec:
      type: storage
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: wazuh-opensearch
      description: OpenSearch indexer for Wazuh security events
      tags:
        - database
        - opensearch
        - siem
    spec:
      type: database
      owner: platform-team
      system: wazuh-system
