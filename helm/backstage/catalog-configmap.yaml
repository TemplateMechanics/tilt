apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-catalog
  namespace: backstage
data:
  all.yaml: |
    # =============================================================================
    # ORGANIZATIONAL ENTITIES
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: infrastructure
      description: Infrastructure and platform services
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: developer-tools
      description: Developer productivity and testing tools
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: ai-ml
      description: AI/ML services and infrastructure
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: data-platform
      description: Data processing and workflow orchestration
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Group
    metadata:
      name: platform-team
      description: Platform engineering team
    spec:
      type: team
      children: []
    
    # =============================================================================
    # SYSTEMS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: dev-environment
      description: Local Kubernetes development environment managed by Tilt
      annotations:
        dev.tilt/managed: "true"
    spec:
      owner: platform-team
      domain: infrastructure
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: observability-stack
      description: Monitoring, logging, and tracing infrastructure
    spec:
      owner: platform-team
      domain: infrastructure
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: airflow-system
      description: Apache Airflow workflow orchestration platform
      annotations:
        dev.tilt/config-key: raw_apps.airflow
    spec:
      owner: platform-team
      domain: data-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: harbor-system
      description: Harbor container registry with scanning and replication
      annotations:
        dev.tilt/config-key: crossplane_apps.harbor
    spec:
      owner: platform-team
      domain: infrastructure
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: keycloak-system
      description: Keycloak identity and access management
      annotations:
        dev.tilt/config-key: raw_apps.keycloak
    spec:
      owner: platform-team
      domain: infrastructure
    
    # =============================================================================
    # APIS - Service interfaces
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: traefik-api
      description: Traefik ingress routing and dashboard API
      tags:
        - rest
        - ingress
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Traefik API
          version: "2.0"
        paths:
          /api/overview:
            get:
              summary: Get Traefik overview
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: prometheus-api
      description: Prometheus metrics query API
      tags:
        - rest
        - metrics
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: observability-stack
      definition: |
        openapi: "3.0.0"
        info:
          title: Prometheus API
          version: "2.0"
        paths:
          /api/v1/query:
            get:
              summary: Query metrics
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: harbor-api
      description: Harbor container registry API
      tags:
        - rest
        - registry
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: harbor-system
      definition: |
        openapi: "3.0.0"
        info:
          title: Harbor API
          version: "2.0"
        paths:
          /api/v2.0/projects:
            get:
              summary: List projects
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: keycloak-api
      description: Keycloak admin and OIDC API
      tags:
        - rest
        - oidc
        - authentication
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: keycloak-system
      definition: |
        openapi: "3.0.0"
        info:
          title: Keycloak Admin API
          version: "20.0"
        paths:
          /admin/realms:
            get:
              summary: List realms
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: airflow-api
      description: Apache Airflow REST API
      tags:
        - rest
        - workflow
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: airflow-system
      definition: |
        openapi: "3.0.0"
        info:
          title: Airflow API
          version: "2.0"
        paths:
          /api/v1/dags:
            get:
              summary: List DAGs
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: langfuse-api
      description: Langfuse LLM observability API
      tags:
        - rest
        - llm
        - tracing
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Langfuse API
          version: "1.0"
        paths:
          /api/public/traces:
            get:
              summary: List traces
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: qdrant-api
      description: Qdrant vector database API
      tags:
        - rest
        - vector-db
        - grpc
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Qdrant API
          version: "1.0"
        paths:
          /collections:
            get:
              summary: List collections
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: ollama-api
      description: Ollama LLM inference API
      tags:
        - rest
        - llm
        - inference
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: dev-environment
      definition: |
        openapi: "3.0.0"
        info:
          title: Ollama API
          version: "1.0"
        paths:
          /api/generate:
            post:
              summary: Generate completion
    
    # =============================================================================
    # RESOURCES - Databases, Caches, Storage
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: airflow-postgresql
      description: PostgreSQL database for Airflow metadata
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: airflow-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: airflow-redis
      description: Redis for Airflow Celery broker
      tags:
        - cache
        - redis
        - celery
    spec:
      type: database
      owner: platform-team
      system: airflow-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: backstage-postgresql
      description: PostgreSQL database for Backstage catalog
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: harbor-redis
      description: Redis cache for Harbor
      tags:
        - cache
        - redis
    spec:
      type: database
      owner: platform-team
      system: harbor-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: harbor-postgresql
      description: PostgreSQL database for Harbor
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: harbor-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: keycloak-postgresql
      description: PostgreSQL database for Keycloak
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: keycloak-system
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: langfuse-postgresql
      description: PostgreSQL database for Langfuse
      tags:
        - database
        - postgresql
    spec:
      type: database
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Resource
    metadata:
      name: jenkins-storage
      description: Persistent storage for Jenkins home
      tags:
        - storage
        - pvc
    spec:
      type: storage
      owner: platform-team
      system: dev-environment
    
    # =============================================================================
    # INFRASTRUCTURE COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: traefik
      description: Cloud-native ingress controller and reverse proxy
      annotations:
        dev.tilt/resource: traefik
        dev.tilt/namespace: traefik
        dev.tilt/enabled: "true"
      tags:
        - ingress
        - networking
        - infrastructure
      links:
        - url: https://traefik.localhost/dashboard/
          title: Traefik Dashboard
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
      providesApis:
        - traefik-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: cert-manager
      description: Cloud-native certificate management for Kubernetes
      annotations:
        dev.tilt/resource: cert-manager
        dev.tilt/namespace: cert-manager
        dev.tilt/config-key: flux_apps.cert-manager
      tags:
        - certificates
        - security
        - infrastructure
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: crossplane
      description: Cloud-native control plane framework for building cloud platforms
      annotations:
        dev.tilt/resource: crossplane
        dev.tilt/namespace: crossplane-system
        dev.tilt/enabled: "true"
      tags:
        - infrastructure
        - control-plane
        - cloud
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: kyverno
      description: Kubernetes native policy management
      annotations:
        dev.tilt/resource: kyverno
        dev.tilt/namespace: kyverno
        dev.tilt/config-key: flux_apps.kyverno
      tags:
        - policy
        - security
        - governance
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: velero
      description: Backup and disaster recovery for Kubernetes
      annotations:
        dev.tilt/resource: velero
        dev.tilt/namespace: velero
        dev.tilt/config-key: flux_apps.velero
      tags:
        - backup
        - disaster-recovery
        - infrastructure
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
    
    # =============================================================================
    # OBSERVABILITY STACK COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: prometheus
      description: Open source monitoring and alerting toolkit
      annotations:
        dev.tilt/resource: prometheus
        dev.tilt/namespace: monitoring
        dev.tilt/enabled: "true"
      tags:
        - monitoring
        - metrics
        - observability
      links:
        - url: https://prometheus.localhost
          title: Prometheus Dashboard
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: observability-stack
      providesApis:
        - prometheus-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: loki
      description: Log aggregation system by Grafana Labs
      annotations:
        dev.tilt/resource: loki
        dev.tilt/namespace: logging
        dev.tilt/enabled: "true"
      tags:
        - logging
        - observability
        - grafana
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: observability-stack
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: tempo
      description: Distributed tracing backend by Grafana Labs
      annotations:
        dev.tilt/resource: tempo
        dev.tilt/namespace: tracing
        dev.tilt/enabled: "true"
      tags:
        - tracing
        - observability
        - grafana
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: observability-stack
    
    # =============================================================================
    # AIRFLOW SYSTEM COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: airflow
      title: Apache Airflow
      description: Workflow orchestration platform for data pipelines
      annotations:
        dev.tilt/resource: airflow
        dev.tilt/namespace: airflow
        dev.tilt/config-key: raw_apps.airflow
      tags:
        - workflow
        - data-engineering
        - orchestration
      links:
        - url: https://airflow.localhost
          title: Airflow Dashboard
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: airflow-system
      providesApis:
        - airflow-api
      dependsOn:
        - resource:airflow-postgresql
        - resource:airflow-redis
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: airflow-webserver
      description: Airflow web UI and API server
      annotations:
        dev.tilt/namespace: airflow
      tags:
        - airflow
        - webserver
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: airflow-system
      dependsOn:
        - resource:airflow-postgresql
      subcomponentOf: airflow
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: airflow-scheduler
      description: Airflow DAG scheduler
      annotations:
        dev.tilt/namespace: airflow
      tags:
        - airflow
        - scheduler
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: airflow-system
      dependsOn:
        - resource:airflow-postgresql
        - resource:airflow-redis
      subcomponentOf: airflow
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: airflow-worker
      description: Airflow Celery worker for task execution
      annotations:
        dev.tilt/namespace: airflow
      tags:
        - airflow
        - worker
        - celery
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: airflow-system
      dependsOn:
        - resource:airflow-postgresql
        - resource:airflow-redis
      subcomponentOf: airflow
    
    # =============================================================================
    # HARBOR SYSTEM COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: harbor
      title: Harbor Registry
      description: Cloud native container registry with vulnerability scanning
      annotations:
        dev.tilt/resource: harbor
        dev.tilt/namespace: harbor
        dev.tilt/config-key: crossplane_apps.harbor
      tags:
        - registry
        - containers
        - security
      links:
        - url: https://harbor.localhost
          title: Harbor Portal
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: harbor-system
      providesApis:
        - harbor-api
      dependsOn:
        - resource:harbor-postgresql
        - resource:harbor-redis
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: harbor-core
      description: Harbor core API server
      tags:
        - harbor
        - api
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: harbor-system
      subcomponentOf: harbor
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: harbor-trivy
      description: Trivy vulnerability scanner for Harbor
      tags:
        - harbor
        - security
        - scanner
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: harbor-system
      subcomponentOf: harbor
    
    # =============================================================================
    # KEYCLOAK SYSTEM COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: keycloak
      title: Keycloak
      description: Open source identity and access management
      annotations:
        dev.tilt/resource: keycloak
        dev.tilt/namespace: keycloak
        dev.tilt/config-key: raw_apps.keycloak
      tags:
        - identity
        - authentication
        - oauth
      links:
        - url: https://keycloak.localhost
          title: Keycloak Admin Console
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: keycloak-system
      providesApis:
        - keycloak-api
      dependsOn:
        - resource:keycloak-postgresql
    
    # =============================================================================
    # AI/ML COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: ollama
      description: Local large language model server
      annotations:
        dev.tilt/resource: ollama
        dev.tilt/namespace: ollama
        dev.tilt/config-key: flux_apps.ollama
      tags:
        - ai
        - llm
        - machine-learning
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
      providesApis:
        - ollama-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: qdrant
      description: Vector similarity search engine for AI applications
      annotations:
        dev.tilt/resource: qdrant
        dev.tilt/namespace: qdrant
        dev.tilt/config-key: crossplane_apps.qdrant
      tags:
        - ai
        - vector-database
        - search
      links:
        - url: https://qdrant.localhost
          title: Qdrant Dashboard
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
      providesApis:
        - qdrant-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: langfuse
      description: Open source LLM engineering platform for tracing and analytics
      annotations:
        dev.tilt/resource: langfuse
        dev.tilt/namespace: langfuse
        dev.tilt/config-key: crossplane_apps.langfuse
      tags:
        - ai
        - llm
        - observability
      links:
        - url: https://langfuse.localhost
          title: Langfuse Dashboard
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
      providesApis:
        - langfuse-api
      dependsOn:
        - resource:langfuse-postgresql
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: jupyterhub
      description: Multi-user Jupyter notebook server
      annotations:
        dev.tilt/resource: jupyterhub
        dev.tilt/namespace: jupyterhub
        dev.tilt/config-key: raw_apps.jupyterhub
      tags:
        - notebooks
        - data-science
        - python
      links:
        - url: https://jupyterhub.localhost
          title: JupyterHub
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
    
    # =============================================================================
    # CI/CD COMPONENTS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: jenkins
      description: Open source automation server for CI/CD
      annotations:
        dev.tilt/resource: jenkins
        dev.tilt/namespace: jenkins
        dev.tilt/config-key: crossplane_apps.jenkins
      tags:
        - ci-cd
        - automation
        - builds
      links:
        - url: https://jenkins.localhost
          title: Jenkins Dashboard
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
      dependsOn:
        - resource:jenkins-storage
    
    # =============================================================================
    # DEVELOPER TOOLS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: backstage
      description: Developer portal and service catalog
      annotations:
        dev.tilt/resource: backstage
        dev.tilt/namespace: backstage
        dev.tilt/config-key: raw_apps.backstage
      tags:
        - developer-portal
        - catalog
        - platform
      links:
        - url: https://backstage.localhost
          title: Backstage Portal
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: dev-environment
      dependsOn:
        - resource:backstage-postgresql
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: mailhog
      description: Email testing tool for developers
      annotations:
        dev.tilt/resource: mailhog
        dev.tilt/namespace: mailhog
        dev.tilt/config-key: raw_apps.mailhog
      tags:
        - email
        - testing
        - development
      links:
        - url: https://mailhog.localhost
          title: MailHog UI
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
    
    # =============================================================================
    # CLOUD EMULATORS
    # =============================================================================
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: localstack
      description: AWS cloud service emulator for local development
      annotations:
        dev.tilt/resource: localstack
        dev.tilt/namespace: localstack
        dev.tilt/config-key: crossplane_apps.localstack
      tags:
        - aws
        - emulator
        - cloud
      links:
        - url: https://localstack.localhost
          title: LocalStack Dashboard
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: azurite
      description: Azure Storage emulator for local development
      annotations:
        dev.tilt/resource: azurite
        dev.tilt/namespace: azurite
        dev.tilt/config-key: raw_apps.azurite
      tags:
        - azure
        - storage
        - emulator
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: gcp-emulators
      description: GCP emulators (Pub/Sub, Firestore, Bigtable)
      annotations:
        dev.tilt/resource: gcp-emulators
        dev.tilt/namespace: gcp-emulators
        dev.tilt/config-key: raw_apps.gcp-emulators
      tags:
        - gcp
        - pubsub
        - firestore
        - emulator
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: gcp-pubsub-emulator
      description: Google Cloud Pub/Sub emulator
      tags:
        - gcp
        - pubsub
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
      subcomponentOf: gcp-emulators
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: gcp-firestore-emulator
      description: Google Cloud Firestore emulator
      tags:
        - gcp
        - firestore
    spec:
      type: service
      lifecycle: development
      owner: platform-team
      system: dev-environment
      subcomponentOf: gcp-emulators
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: gcp-bigtable-emulator
      description: Google Cloud Bigtable emulator
      tags:
        - gcp
        - bigtable
    spec:
      type: service
      lifecycle: development
