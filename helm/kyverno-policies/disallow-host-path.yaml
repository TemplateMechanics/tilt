apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-host-path
  annotations:
    policies.kyverno.io/title: Disallow hostPath
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod,Volume
    kyverno.io/kyverno-version: 3.1.3
    kyverno.io/kubernetes-version: "1.22-1.27"
    policies.kyverno.io/description: >-
      HostPath volumes let Pods use host directories and volumes in containers. Using host resources can be used to access shared data or escalate privileges and should not be allowed. This policy ensures no hostPath volumes are in use.
spec:
  validationFailureAction: audit
  background: true
  rules:
  - name: host-path
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - grafana
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: >-
        HostPath volumes are forbidden. The field spec.volumes[*].hostPath must be unset.
      pattern:
        spec:
          =(volumes):
          - X(hostPath): "null"
