apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: argo
spec:
  interval: 5m
  chart:
    spec:
      chart: argo-workflows
      version: "0.45.0"
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  values:
    singleNamespace: false
    workflow:
      serviceAccount:
        create: true
    controller:
      metricsConfig:
        enabled: true
        port: 9090
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      persistence:
        archive: false
    server:
      enabled: true
      authMode: server
      extraArgs:
        - --auth-mode=server
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
