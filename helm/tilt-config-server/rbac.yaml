apiVersion: v1
kind: ServiceAccount
metadata:
  name: tilt-config-server
  namespace: tilt-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tilt-config-manager
  namespace: tilt-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["tilt-config"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tilt-config-server-binding
  namespace: tilt-system
subjects:
  - kind: ServiceAccount
    name: tilt-config-server
    namespace: tilt-system
roleRef:
  kind: Role
  name: tilt-config-manager
  apiGroup: rbac.authorization.k8s.io
