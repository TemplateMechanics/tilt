---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-emulator
  namespace: gcp-emulators
spec:
  replicas: 1
  selector:
    matchLabels:
      app: datastore-emulator
  template:
    metadata:
      labels:
        app: datastore-emulator
    spec:
      containers:
      - name: datastore
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
        command: ["gcloud", "beta", "emulators", "datastore", "start", "--project=test-project", "--host-port=0.0.0.0:8081", "--no-store-on-disk", "--consistency=1.0"]
        ports:
        - containerPort: 8081
          name: datastore
        env:
        - name: DATASTORE_PROJECT_ID
          value: "test-project"
---
apiVersion: v1
kind: Service
metadata:
  name: datastore-emulator
  namespace: gcp-emulators
spec:
  selector:
    app: datastore-emulator
  ports:
  - port: 8081
    targetPort: 8081
    name: datastore
