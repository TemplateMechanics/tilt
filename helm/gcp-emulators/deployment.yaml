---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firestore-emulator
  namespace: gcp-emulators
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firestore-emulator
  template:
    metadata:
      labels:
        app: firestore-emulator
    spec:
      containers:
      - name: firestore
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
        command: ["gcloud", "emulators", "firestore", "start", "--host-port=0.0.0.0:8080"]
        ports:
        - containerPort: 8080
          name: firestore
        env:
        - name: FIRESTORE_PROJECT_ID
          value: "test-project"
---
apiVersion: v1
kind: Service
metadata:
  name: firestore-emulator
  namespace: gcp-emulators
spec:
  selector:
    app: firestore-emulator
  ports:
  - port: 8080
    targetPort: 8080
    name: firestore
---
